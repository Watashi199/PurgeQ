# Publishes the extension to the Chrome Web Store and Firefox AMO
# when a semver tag (e.g. 2.1.2) is pushed.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   Chrome Web Store
#     CWS_EXTENSION_ID   — the extension's Chrome ID (visible in the store URL)
#     CWS_CLIENT_ID      — OAuth2 client ID
#     CWS_CLIENT_SECRET  — OAuth2 client secret
#     CWS_REFRESH_TOKEN  — OAuth2 refresh token (long-lived)
#   How to obtain: enable the Chrome Web Store API in Google Cloud,
#   create an OAuth2 client (type "Desktop"), then exchange an auth code
#   for a refresh token once. Docs:
#   https://developer.chrome.com/docs/webstore/using-api
#
#   Firefox AMO
#     AMO_JWT_ISSUER  — JWT issuer
#     AMO_JWT_SECRET  — JWT secret
#   How to obtain: https://addons.mozilla.org/developers/addon/api/key/

name: Release to stores

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — build only, no store upload, no GitHub Release update."
        type: boolean
        default: true

permissions:
  contents: write  # softprops/action-gh-release needs this to attach assets

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Resolve version (verify tag matches manifest on tag pushes)
        id: version
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
              echo "::error::Tag '$GITHUB_REF_NAME' does not match manifest.json version '$MANIFEST_VERSION'."
              exit 1
            fi
            VERSION="$TAG_VERSION"
          else
            VERSION="$MANIFEST_VERSION"
          fi
          # Exposed both as a step output (for YAML expressions like
          # steps.version.outputs.value) and as $VERSION in later shell steps.
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Resolved version: $VERSION"

      - name: Build Chrome, Firefox, and source packages
        run: |
          npm run package
          npm run package:firefox
          npm run package:source

      - name: Upload to Chrome Web Store
        if: ${{ !inputs.dry_run }}
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "purgeq-${VERSION}.zip" \
            --auto-publish

      - name: Submit to Firefox AMO (listed channel)
        # Run even if the Chrome step failed — the two stores are independent
        # and shouldn't be coupled. Still skipped on dry-run.
        if: ${{ !inputs.dry_run && !cancelled() }}
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: |
          # web-ext sign expects an unpacked directory, so unzip the Firefox
          # build we just produced (it already has the merged gecko manifest).
          rm -rf .ff-build && mkdir .ff-build
          unzip -q "purgeq-firefox-${VERSION}.zip" -d .ff-build
          # AMO requires categories, summary, and version.license to be present
          # in every listed submission's metadata. Categories/summary mirror
          # what's already on the addon listing; we just re-send them on each
          # version. License matches the LICENSE file at repo root.
          cat > amo-metadata.json <<'EOF'
          {
            "categories": ["games-entertainment"],
            "summary": {"en-US": "Real-time FACEIT player banlist checker with offline support"},
            "version": {"license": "MIT"}
          }
          EOF
          # --approval-timeout=0 short-circuits the post-submission wait —
          # for listed channel that wait is the human review queue (days),
          # which CI must not block on. Submission itself is still
          # synchronous, so any submission error still surfaces here.
          npx --yes web-ext@8 sign \
            --channel=listed \
            --source-dir=.ff-build \
            --upload-source-code="purgeq-source-${VERSION}.zip" \
            --amo-metadata=amo-metadata.json \
            --approval-timeout=0 \
            --no-config-discovery

      - name: Attach zips to GitHub Release
        # Skipped on workflow_dispatch entirely — Releases are tied to tags,
        # so we never touch them from a manual run.
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            extension/purgeq-${{ github.ref_name }}.zip
            extension/purgeq-firefox-${{ github.ref_name }}.zip
            extension/purgeq-source-${{ github.ref_name }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true

      - name: Dry-run summary
        if: ${{ inputs.dry_run }}
        run: |
          echo "::notice::Dry run for version $VERSION — built three zips, skipped all store/release calls."
          ls -la "purgeq-${VERSION}.zip" "purgeq-firefox-${VERSION}.zip" "purgeq-source-${VERSION}.zip"
