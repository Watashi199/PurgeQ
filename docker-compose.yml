services:
  postgres:
    image: postgres:16-alpine
    container_name: purgeq-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-purgeq}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-purgeq}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - purgeq-network

  redis:
    image: redis:7-alpine
    container_name: purgeq-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - purgeq-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: purgeq-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-purgeq}
      REDIS_URL: redis://redis:6379/0
      API_KEY_HEADER: X-API-Key
      VALID_API_KEYS: ${VALID_API_KEYS:-test-key-1,test-key-2}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-purgeq}
      DEBUG: "${DEBUG:-false}"
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./api:/app/api
      - ./migrations:/app/migrations
    command: ["sh", "/app/start.sh"]
    networks:
      - purgeq-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  purgeq-network:
    driver: bridge
