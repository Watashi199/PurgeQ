<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>PurgeQ — Sign in</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --bg: #0d0d0f;
        --surface: #17171a;
        --border: #25252a;
        --text: #f5f5f7;
        --muted: #a3a3a8;
        --orange: #ff5500;
        --danger: #fca5a5;
      }
      * { box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 28px;
        max-width: 360px;
        width: 100%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      }
      .brand {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        margin-bottom: 6px;
      }
      .brand h1 { font-size: 22px; font-weight: 700; margin: 0; letter-spacing: 0.2px; }
      .hint {
        color: var(--muted);
        font-size: 13.5px;
        line-height: 1.5;
        margin: 8px 0 16px;
      }
      .turnstile-host {
        margin: 14px 0 4px;
        display: flex;
        justify-content: center;
        min-height: 65px;
      }
      .status {
        color: var(--muted);
        font-size: 12px;
        min-height: 16px;
        margin: 6px 0 0;
      }
      .error {
        color: var(--danger);
        font-size: 12.5px;
        min-height: 18px;
        margin: 6px 0 0;
        word-break: break-word;
      }
      .spinner {
        display: inline-block;
        width: 12px;
        height: 12px;
        border: 2px solid var(--muted);
        border-top-color: var(--orange);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 6px;
        vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" aria-hidden="true">
          <path stroke="#ff5500" stroke-width="2" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
          <path stroke="#fff" stroke-width="2" d="m8 12 3 3 5-5" />
        </svg>
        <h1>PurgeQ</h1>
      </div>
      <p class="hint">
        Hold on, we're verifying you're human and sending you to Discord to sign in.
      </p>
      <div id="turnstile-host" class="turnstile-host"></div>
      <p id="status" class="status"></p>
      <p id="error" class="error"></p>
    </main>

    <script>
      // Public configuration — safe to ship in the bundle. The real secrets
      // (Supabase service_role + Cloudflare Turnstile secret) live server-side.
      const SUPABASE_URL = 'https://ehszjqppifszlgfanmbp.supabase.co';
      const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_vmsaF39NN_E9Kwf0UAlqgA_t-uFczVK';
      const TURNSTILE_SITE_KEY = '0x4AAAAAADREzqhHizBzlVOZ';

      const errEl = document.getElementById('error');
      const statusEl = document.getElementById('status');

      // Validate the redirect_to query param — must point at a Chrome extension
      // callback URL (chromiumapp.org). Open redirects are how phishing kits
      // bounce victims through legit-looking auth pages, so we lock this down
      // tight: HTTPS only, hostname must end in .chromiumapp.org.
      function isValidRedirect(rawUrl) {
        if (!rawUrl) return false;
        try {
          const u = new URL(rawUrl);
          return u.protocol === 'https:' && u.hostname.endsWith('.chromiumapp.org');
        } catch {
          return false;
        }
      }

      const params = new URLSearchParams(location.search);
      const redirectTo = params.get('redirect_to');

      if (!isValidRedirect(redirectTo)) {
        errEl.textContent =
          'Invalid sign-in link. Please open the PurgeQ extension and try again.';
      } else {
        const supabase = window.supabase.createClient(
          SUPABASE_URL,
          SUPABASE_PUBLISHABLE_KEY
        );

        async function startSignIn(captchaToken) {
          statusEl.innerHTML =
            '<span class="spinner"></span> Redirecting to Discord...';
          errEl.textContent = '';
          try {
            const { data, error } = await supabase.auth.signInWithOAuth({
              provider: 'discord',
              options: {
                redirectTo,
                captchaToken,
                skipBrowserRedirect: true,
              },
            });
            if (error) throw error;
            if (!data || !data.url) throw new Error('No OAuth URL returned');
            location.replace(data.url);
          } catch (e) {
            errEl.textContent = (e && e.message) || String(e);
            statusEl.textContent = '';
          }
        }

        // Turnstile may load after this script (async defer). Poll until the
        // global appears, then render the widget.
        function mountTurnstile() {
          if (!window.turnstile) {
            setTimeout(mountTurnstile, 100);
            return;
          }
          window.turnstile.render('#turnstile-host', {
            sitekey: TURNSTILE_SITE_KEY,
            theme: 'dark',
            callback: (token) => startSignIn(token),
            'error-callback': () => {
              errEl.textContent =
                'Verification failed. Refresh and try again.';
            },
            'expired-callback': () => {
              errEl.textContent =
                'Verification expired. Refresh and try again.';
            },
          });
        }
        mountTurnstile();
      }
    </script>
  </body>
</html>
